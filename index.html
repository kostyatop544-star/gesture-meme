<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>gesture_meme // live detector</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Верхняя панель — "окно" с найденным мемом, стилизовано под редактор кода -->
    <section class="pane pane--meme">
      <div class="win-bar">
        <span class="dot dot--r"></span><span class="dot dot--y"></span><span class="dot dot--g"></span>
        <span class="win-title" id="matchTitle">meme_detectado.png</span>
      </div>
      <div class="meme-stage" id="memeStage">
        <div class="meme-empty" id="memeEmpty">
          <span class="cursor">_</span>
          <p>жду жест...</p>
        </div>
        <img id="memeImg" alt="matched meme" class="meme-img hidden" />
      </div>
    </section>

    <!-- Нижняя панель — живая камера -->
    <section class="pane pane--cam">
      <div class="win-bar">
        <span class="dot dot--r"></span><span class="dot dot--y"></span><span class="dot dot--g"></span>
        <span class="win-title">tu_camara.live</span>
        <span class="status" id="status">инициализация...</span>
      </div>
      <div class="cam-stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="controls">
        <button id="btnLibrary" class="btn btn--ghost">
          <span class="ic">▤</span> библиотека <span class="count" id="libCount">0</span>
        </button>
        <button id="btnAdd" class="btn btn--accent">
          <span class="ic">+</span> добавить мем
        </button>
      </div>
    </section>

  </div>

  <!-- Модалка: добавление нового мема -->
  <div class="modal hidden" id="modalAdd">
    <div class="modal-card">
      <div class="win-bar">
        <span class="dot dot--r"></span><span class="dot dot--y"></span><span class="dot dot--g"></span>
        <span class="win-title">new_meme.setup</span>
        <button class="modal-close" id="closeAdd">×</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span>картинка</span>
          <input type="file" id="fileInput" accept="image/*" />
          <div class="preview-wrap"><img id="filePreview" class="hidden" /></div>
        </label>

        <label class="field">
          <span>название</span>
          <input type="text" id="nameInput" placeholder="например: sonic.exe" />
        </label>

        <div class="field">
          <span>поза</span>
          <p class="hint">Встань перед камерой в нужной позе и нажми кнопку.</p>
          <button id="btnCapturePose" class="btn btn--outline">записать текущую позу</button>
          <p class="pose-status" id="poseStatus">поза не записана</p>
        </div>

        <div class="field">
          <span>строгость совпадения: <b id="thresholdVal">0.35</b></span>
          <input type="range" id="thresholdInput" min="0.15" max="0.6" step="0.01" value="0.35" />
        </div>

        <button id="btnSaveMeme" class="btn btn--accent btn--full" disabled>сохранить мем</button>
      </div>
    </div>
  </div>

  <!-- Модалка: библиотека -->
  <div class="modal hidden" id="modalLibrary">
    <div class="modal-card">
      <div class="win-bar">
        <span class="dot dot--r"></span><span class="dot dot--y"></span><span class="dot dot--g"></span>
        <span class="win-title">library.list</span>
        <button class="modal-close" id="closeLibrary">×</button>
      </div>
      <div class="modal-body">
        <div class="grid" id="libraryGrid"></div>
        <p class="hint" id="libraryEmptyHint">Мемов пока нет — добавь первый с главного экрана.</p>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
